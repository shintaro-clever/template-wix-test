name: "AI Bootstrap (Figma × GitHub × AI)"
description: "Figma URL / AI thread URL(s) / Acceptance Criteria を必須化"
title: "[AI] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        このIssueは「Figma × GitHub × AI」を連動させるための起点です。
        PRでは以下を必須にしてください：
        - Fixes #<issue>
        - Figma URL
        - 受入条件（AC）のチェック済み（- [x] が最低1つ）
        - AI thread URL(s)（複数AI可）

  - type: input
    id: figma_url
    attributes:
      label: "Figma URL"
      description: "figma.com/design または figma.com/file"
      placeholder: "https://www.figma.com/design/..."
    validations:
      required: true

  - type: textarea
    id: ai_thread_urls
    attributes:
      label: "AI thread URL(s)"
      description: "ChatGPT / Gemini / Claude など。複数可（1つ以上必須）"
      placeholder: |
        - https://chatgpt.com/...
        - https://gemini.google.com/...
        - https://claude.ai/...
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: "Acceptance Criteria"
      description: "チェックボックスで最低3つ（PR Gateで - [x] が最低1つ必要）"
      value: |
        - [ ] PR本文に Fixes #<this issue> がある
        - [ ] PR本文に Figma URL がある
        - [ ] PR本文に - [x] のACが最低1つある
    validations:
      required: true

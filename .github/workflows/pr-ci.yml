name: pr-ci

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      selftest: ${{ steps.filter.outputs.selftest }}
      e2e_basic: ${{ steps.filter.outputs.e2e_basic }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            selftest:
              - "scripts/**"
              - "src/**"
              - "tests/**"
              - "package.json"
              - "package-lock.json"
            e2e_basic:
              - "scripts/run-job.js"
              - "scripts/mcp-stub-runner.js"
              - "scripts/sample-job*.json"
              - "src/**"
              - "package.json"

  selftest:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.selftest == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          registry-url: https://registry.npmjs.org
      - name: Install
        run: npm install --no-audit --no-fund
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Selftest
        run: npm test

  e2e-basic:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.e2e_basic == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          registry-url: https://registry.npmjs.org
      - name: Install
        run: npm install --no-audit --no-fund
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: E2E basic
        run: node scripts/run-job.js --job scripts/sample-job.mcp.offline.smoke.json --role operator

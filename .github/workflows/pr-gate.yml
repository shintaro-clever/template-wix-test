name: PR Gate

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body has required fields
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr && pr.body) ? pr.body : "";

            // 1) Linked Issue: Fixes #123 / Closes #123
            const issueRegex = /\b(?:Fixes|Closes)\s+#\d+\b/i;

            // 2) Acceptance Criteria: チェック済みが最低1つ
            // - [x] も - [X] も許可
            const checkedBoxRegex = /-\s*\[[xX]\]\s+.+/;

            const errors = [];

            if (!issueRegex.test(body)) {
              errors.push('Missing "Fixes #<number>" or "Closes #<number>".');
            }
            if (!checkedBoxRegex.test(body)) {
              errors.push('Missing checked Acceptance Criteria (e.g., "- [x] ...").');
            }

            if (errors.length) {
              core.setFailed(
                `PR Gate failed:\n- ${errors.join("\n- ")}\n\n` +
                `Expected in PR body:\n` +
                `1) Fixes #123 or Closes #123\n` +
                `2) At least one checked box: - [x] ...`
              );
            } else {
              core.info("PR Gate passed ✅");
            }

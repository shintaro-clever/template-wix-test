name: PR Gate (Require Issue + Figma + Checklist)

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body has required content
        uses: actions/github-script@v7
        with:
          script: |
            const raw = context.payload.pull_request?.body ?? "";

            // 文字正規化（ゼロ幅スペース/全角スペース混入対策）
            const body = raw
              .normalize("NFKC")
              .replace(/[\u200B-\u200D\uFEFF]/g, "") // zero-width
              .replace(/\u00A0/g, " ")              // NBSP
              .replace(/\r\n/g, "\n");

            const hasIssueRef = /(Fixes|Closes)\s*#\s*\d+/i.test(body);
            const hasFigma    = /https:\/\/(www\.)?figma\.com\/\S+/i.test(body);
            const hasChecked  = /- \[[xX]\]/.test(body);

            const errors = [];
            if (!hasIssueRef) errors.push('Missing issue reference. Add "Fixes #<issue_number>".');
            if (!hasFigma)    errors.push("Missing Figma URL. Add a figma.com link.");
            if (!hasChecked)  errors.push("Missing acceptance criteria checklist. Check at least one checkbox item.");

            if (errors.length) core.setFailed(errors.join("\n"));

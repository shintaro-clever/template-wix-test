name: PR Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: PR本文を検証（関連Issue or No Issue + ACチェック）
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr && pr.body) ? pr.body : "";
            const title = (pr && pr.title) ? pr.title : "";

            // ----------------------------
            // Helpers
            // ----------------------------
            const isChecked = (line) => /^\s*[-*]\s+\[[xX]\]\s+/.test(line);
            const lines = body.split(/\r?\n/);

            // ----------------------------
            // A) 「関連Issueあり」チェック（チェック済み かつ #123 を含む）
            // 例: - [x] 関連Issueあり：#12
            // ----------------------------
            const relatedIssueCheckedWithNumber = lines.some(line => {
              if (!isChecked(line)) return false;
              // #123 を含むこと（"Fixes #123" でも "関連Issueあり：#123" でもOK）
              return /#\d+/.test(line) && /関連\s*issue|issue/i.test(line);
            });

            // ----------------------------
            // B) 「No Issue（理由）」チェック（チェック済み）
            // 例: - [x] No Issue（理由）：軽微な変更...
            // ----------------------------
            const noIssueChecked = lines.some(line => {
              if (!isChecked(line)) return false;
              return /\bNo\s*Issue\b/i.test(line);
            });

            // ----------------------------
            // C) 完了条件（AC）のチェック（チェック済みが最低1つ）
            // 例: - [x] AC: PR Gateが緑になる
            // ----------------------------
            const acChecked = lines.some(line => {
              if (!isChecked(line)) return false;
              return /^\s*[-*]\s+\[[xX]\]\s*AC\s*[:：]/.test(line) || /\bAC\b/.test(line) && isChecked(line);
            });

            // A or B が成立しているか（二択強制）
            const hasIssueOrNoIssue = relatedIssueCheckedWithNumber || noIssueChecked;

            const errors = [];
            if (!hasIssueOrNoIssue) {
              errors.push("PR本文の「関連Issueあり（#番号）」または「No Issue（理由）」のどちらかをチェックしてください。");
            }

            // 「関連Issueあり」をチェックしたのに #番号が無い、を検知（任意で厳密化）
            const relatedIssueCheckedButNoNumber = lines.some(line => {
              if (!isChecked(line)) return false;
              if (!/関連\s*issue|issue/i.test(line)) return false;
              if (/\bNo\s*Issue\b/i.test(line)) return false;
              // "関連Issueあり" 系なのに #数字が無い
              return !/#\d+/.test(line) && /関連\s*issue|issue/i.test(line);
            });
            if (relatedIssueCheckedButNoNumber) {
              errors.push("「関連Issueあり」をチェックした場合は、本文内に #番号（例: #12）を含めてください。");
            }

            if (!acChecked) {
              errors.push("PR本文にチェック済みの完了条件（AC）が最低1つ必要です（例: `- [x] AC: ...`）。");
            }

            if (errors.length) {
              core.setFailed(
                [
                  "PR Gate failed.",
                  "",
                  ...errors.map(e => `- ${e}`),
                  "",
                  "Tip:",
                  "- 軽微な修正は Issue を作らず「No Issue（理由）」で運用してください。",
                  "- 参照リンク（Figma/AI thread 等）は原則 Issue 側に集約し、PR は実装差分の合否に集中してください。",
                ].join("\n")
              );
            } else {
              core.info("PR Gate passed: (Issue or No Issue) + at least one AC checked.");
              core.info(`Title: ${title}`);
            }

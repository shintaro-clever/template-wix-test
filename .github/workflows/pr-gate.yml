name: PR Gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest

    steps:
      - name: PR本文を検証（関連Issue or No Issue + ACチェック）
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body ?? "";
            const title = context.payload.pull_request?.title ?? "";

            // A) 関連Issueあり（チェック済み + #番号必須）
            // 例: - [x] 関連Issueあり: #123
            const hasIssueChecked = /^\s*[-*]\s+\[[xX]\]\s+関連Issueあり:\s*#\d+\s*$/m.test(body);

            // B) No Issue（理由）（チェック済み + 理由必須）
            // 例: - [x] No Issue（理由）: 文言修正のため
            const hasNoIssueChecked = /^\s*[-*]\s+\[[xX]\]\s+No Issue（理由）:\s+\S.+$/m.test(body);

            // C) ACチェック（チェック済み + 内容必須）
            // 例: - [x] AC: PR Gateが緑になる
            const hasCheckedAC = /^\s*[-*]\s+\[[xX]\]\s+AC:\s+\S.+$/m.test(body);

            const errors = [];

            if (!hasIssueChecked && !hasNoIssueChecked) {
              errors.push("PR本文に `関連Issueあり: #番号` か `No Issue（理由）: 理由` のチェック済み項目が必要です。");
            }

            if (!hasCheckedAC) {
              errors.push("PR本文にチェック済みの `AC:` が最低1つ必要です（例: `- [x] AC: ...`）。");
            }

            if (errors.length) {
              core.setFailed(
                [
                  "PR Gate failed.",
                  "",
                  ...errors.map(e => `- ${e}`),
                  "",
                  "Tip:",
                  "- 軽度修正のみの場合は `No Issue（理由）` を使ってください。",
                  "- Figma/AI thread 等の固定情報は Issue 側に集約し、PRは「実装の合否」中心にしてください。",
                ].join("\n")
              );
            } else {
              core.info("PR Gate passed: (Issue checkbox OR No Issue checkbox) + at least one checked AC found.");
              core.info(`Title: ${title}`);
            }

name: PR Gate (Require Issue + Figma + Checklist)

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body has required content
        uses: actions/github-script@v7
        with:
          script: |
            // pull_request 以外は PR本文がないのでスキップ（成功扱い）
            if (context.eventName !== "pull_request") {
              core.info(`Skip validation for event: ${context.eventName}`);
              return;
            }

            const bodyRaw = context.payload.pull_request?.body ?? "";
            const body = (bodyRaw || "")
              .normalize("NFKC")              // 全角→半角など吸収（例：Fixes ＃１）
              .replace(/\u200B/g, "")         // zero-width space除去
              .replace(/\r\n/g, "\n");

            // デバッグ用（必要ならActionsログで本文先頭を確認できる）
            core.info("PR body preview (first 300 chars):");
            core.info(body.slice(0, 300));

            // Issue参照: "Fixes #1" / "Closes #1"（スペース有無OK）
            // ※必要なら GitHub Issue URL でもOKにする
            const hasIssueRef =
              /(Fixes|Closes)\s*#\d+/i.test(body) ||
              /https:\/\/github\.com\/[^/\s]+\/[^/\s]+\/issues\/\d+/i.test(body);

            // Figma URL（file/design どちらでもOK）
            const hasFigma =
              /https:\/\/(www\.)?figma\.com\/(file|design)\/\S+/i.test(body);

            // チェックボックスが1つでもあればOK（[ ] でも [x] でも）
            const hasCheckbox = /- \[[ xX]\]/.test(body);

            const errors = [];
            if (!hasIssueRef) errors.push('Missing issue reference. Add "Fixes #<issue_number>".');
            if (!hasFigma) errors.push("Missing Figma URL. Add a figma.com link.");
            if (!hasCheckbox) errors.push("Missing acceptance criteria checklist. Add at least one checkbox item.");

            if (errors.length) core.setFailed(errors.join("\n"));

# 目的: main push 時に wix preview を実行し、プレビューURL を生成する
# 本番公開（wix publish）はこのワークフローでは行わない。
# 本番公開はドメイン設定・課金整備後に管理者が手動で実施する。
name: wix-preview-on-push

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: wix-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify Wix site connection
        run: |
          if [ ! -f wix.config.json ]; then
            echo "::error::wix.config.json is missing. Run docs/wix/connection-plan.md setup first."
            exit 1
          fi

          if [ -z "${WIX_API_KEY}" ]; then
            echo "::error::WIX_API_KEY secret is missing."
            exit 1
          fi
        env:
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}

      - name: Login to Wix CLI
        run: npx wix login --api-key "$WIX_API_KEY"
        env:
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}

      - name: Create Wix preview from main
        run: npx wix preview --source local

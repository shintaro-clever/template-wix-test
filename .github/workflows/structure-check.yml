name: Structure Check

# agents-structure.yml を統合。
# 旧 agents-structure にあった paths フィルタ・concurrency を維持しつつ、
# structure-check 側の node 直接呼び出しコマンドを採用。

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - "agents/**"
      - "docs/ai/**"
      - "scripts/check-structure.js"
      - "package.json"
      - "src/**"

concurrency:
  group: structure-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-structure:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.22.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check structure
        run: node scripts/check-structure.js

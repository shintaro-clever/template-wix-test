<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Account Settings</title>
    <style>
      :root {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        color: #0f172a;
        background: #f5f7fb;
      }
      body {
        margin: 0;
        padding: 0;
        background: #f5f7fb;
      }
      header {
        background: #0f172a;
        color: #fff;
        padding: 2rem 1.5rem;
      }
      main {
        max-width: 720px;
        margin: -2rem auto 3rem;
        padding: 0 1.5rem;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        padding: 2rem;
        box-shadow: 0 25px 50px rgba(15, 23, 42, 0.1);
      }
      label {
        display: block;
        margin-bottom: 1.25rem;
      }
      label span {
        display: block;
        font-weight: 600;
        margin-bottom: 0.4rem;
      }
      input,
      select {
        width: 100%;
        padding: 0.7rem 0.9rem;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        font-size: 1rem;
        box-sizing: border-box;
      }
      button {
        border: none;
        background: #2563eb;
        color: #fff;
        padding: 0.85rem 1.75rem;
        border-radius: 999px;
        font-size: 1rem;
        cursor: pointer;
      }
      .status {
        margin-left: 1rem;
        font-weight: 600;
      }
      .note {
        margin-top: 1.25rem;
        font-size: 0.9rem;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Account 設定</h1>
      <p>この画面の設定はブラウザの localStorage に保存されます。本番では Secrets / Vault を利用してください。</p>
    </header>
    <main>
      <section class="card">
        <form id="accountForm">
          <label>
            <span>ワークスペース名</span>
            <input id="workspaceInput" placeholder="例: Integration Hub Demo" />
          </label>
          <label>
            <span>オーナー名</span>
            <input id="ownerInput" placeholder="例: Operator T2" />
          </label>
          <label>
            <span>表示言語</span>
            <select id="languageSelect">
              <option value="ja">日本語</option>
              <option value="en">English</option>
            </select>
          </label>
          <button type="submit">保存</button>
          <span class="status" id="statusText"></span>
          <p class="note">※ 保存内容はブラウザにのみ保持されます。共有環境では Secrets 管理ツールを使用してください。</p>
        </form>
      </section>
    </main>
    <script>
      const STORAGE_KEYS = {
        workspace: 'hub.account.workspace',
        owner: 'hub.account.owner',
        language: 'hub.lang'
      };

      const workspaceInput = document.getElementById('workspaceInput');
      const ownerInput = document.getElementById('ownerInput');
      const languageSelect = document.getElementById('languageSelect');
      const statusText = document.getElementById('statusText');
      const form = document.getElementById('accountForm');

      function loadAccount() {
        workspaceInput.value = localStorage.getItem(STORAGE_KEYS.workspace) || '';
        ownerInput.value = localStorage.getItem(STORAGE_KEYS.owner) || '';
        languageSelect.value = localStorage.getItem(STORAGE_KEYS.language) || 'ja';
      }

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        localStorage.setItem(STORAGE_KEYS.workspace, workspaceInput.value.trim());
        localStorage.setItem(STORAGE_KEYS.owner, ownerInput.value.trim());
        localStorage.setItem(STORAGE_KEYS.language, languageSelect.value);
        statusText.textContent = '保存しました';
        setTimeout(() => {
          statusText.textContent = '';
        }, 2500);
      });

      loadAccount();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Integration Hub Connections</title>
    <style>
      :root {
        font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        color: #111;
        background-color: #f6f7f9;
      }
      body {
        margin: 0;
        padding: 0;
      }
      header {
        background: #111827;
        color: #fff;
        padding: 1.5rem;
      }
      .header-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }
      .header-row h1 {
        margin: 0;
        font-size: 1.5rem;
        text-align: center;
        flex: 1;
      }
      .back-btn {
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        border: none;
        padding: 0.5rem 1.25rem;
        border-radius: 999px;
        cursor: pointer;
        font-size: 0.95rem;
      }
      .header-spacer {
        width: 96px;
        height: 1px;
        visibility: hidden;
      }
      main {
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem 3rem;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 1.5rem;
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
        margin-bottom: 1.5rem;
      }
      .card h2 {
        margin-top: 0;
        font-size: 1.25rem;
      }
      label {
        display: block;
        font-size: 0.95rem;
        margin-bottom: 1rem;
      }
      label span {
        display: block;
        font-weight: 600;
        margin-bottom: 0.35rem;
      }
      input {
        width: 100%;
        padding: 0.65rem 0.8rem;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        font-size: 1rem;
        box-sizing: border-box;
      }
      .helper-text {
        font-size: 0.85rem;
        color: #4b5563;
        margin-top: 0.25rem;
      }
      .actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        align-items: center;
      }
      button {
        background: #2563eb;
        color: #fff;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 999px;
        font-size: 1rem;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .status {
        font-size: 0.95rem;
        font-weight: 600;
      }
      .status.ok {
        color: #059669;
      }
      .status.error {
        color: #dc2626;
      }
      @media (max-width: 640px) {
        .card {
          padding: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-row">
        <button type="button" class="back-btn" id="backBtn">← 戻る</button>
        <h1>Connections 設定</h1>
        <div class="header-spacer" aria-hidden="true"></div>
      </div>
      <p class="helper-text" style="color: rgba(255, 255, 255, 0.8); max-width: 720px; margin-top: 0.5rem;">
        手元ローカルに保存される暫定UIです。本番運用では Secrets / Vault 管理を必ず導入してください。
      </p>
    </header>
    <main>
      <form id="connectionsForm">
        <div class="card">
          <h2 id="ai">AI 接続</h2>
          <label>
            <span>Provider 名</span>
            <input id="aiProvider" name="aiProvider" placeholder="例: codex" autocomplete="off" />
          </label>
          <label>
            <span>接続名</span>
            <input id="aiConnectionName" name="aiConnectionName" placeholder="例: default-codex" autocomplete="off" />
          </label>
          <label>
            <span>API Key</span>
            <input id="aiApiKey" name="aiApiKey" type="password" placeholder="sk-..." autocomplete="off" />
          </label>
        </div>
        <div class="card">
          <h2 id="github">GitHub 接続</h2>
          <label>
            <span>リポジトリ URL または owner/repo</span>
            <input id="ghRepo" name="ghRepo" placeholder="https://github.com/org/repo" autocomplete="off" />
          </label>
          <label>
            <span>Token</span>
            <input id="ghToken" name="ghToken" type="password" placeholder="ghp_..." autocomplete="off" />
          </label>
        </div>
        <div class="card">
          <h2 id="figma">Figma 接続</h2>
          <label>
            <span>File / Design URL</span>
            <input id="figmaFile" name="figmaFile" placeholder="https://www.figma.com/file/..." autocomplete="off" />
          </label>
          <label>
            <span>Token</span>
            <input id="figmaToken" name="figmaToken" type="password" placeholder="figd_..." autocomplete="off" />
          </label>
        </div>
        <div class="actions">
          <button type="submit" id="saveBtn">保存</button>
          <span class="status" id="saveStatus" aria-live="polite"></span>
        </div>
      </form>
    </main>
    <script>
      const $ = (selector) => document.querySelector(selector);
      const statusEl = $('#saveStatus');
      const saveBtn = $('#saveBtn');
      const formEl = document.getElementById('connectionsForm');
      const backBtn = document.getElementById('backBtn');

      function setStatus(message, type = 'ok') {
        statusEl.textContent = message;
        statusEl.className = `status ${type}`;
      }

      async function loadConnections() {
        try {
          const res = await fetch('/api/connections');
          if (!res.ok) throw new Error('Failed to load connections');
          const data = await res.json();
          $('#aiProvider').value = data.ai?.provider || '';
          $('#aiConnectionName').value = data.ai?.name || '';
          $('#aiApiKey').value = data.ai?.apiKey || '';
          $('#ghRepo').value = data.github?.repo || '';
          $('#ghToken').value = data.github?.token || '';
          $('#figmaFile').value = data.figma?.fileUrl || '';
          $('#figmaToken').value = data.figma?.token || '';
          setStatus('保存済み設定を読み込みました。', 'ok');
        } catch (error) {
          console.error(error);
          setStatus('設定の読み込みに失敗しました。', 'error');
        }
      }

      formEl.addEventListener('submit', async (event) => {
        event.preventDefault();
        setStatus('保存中...', 'ok');
        saveBtn.disabled = true;
        const payload = {
          ai: {
            provider: $('#aiProvider').value.trim(),
            name: $('#aiConnectionName').value.trim(),
            apiKey: $('#aiApiKey').value.trim()
          },
          github: {
            repo: $('#ghRepo').value.trim(),
            token: $('#ghToken').value.trim()
          },
          figma: {
            fileUrl: $('#figmaFile').value.trim(),
            token: $('#figmaToken').value.trim()
          }
        };
        try {
          const res = await fetch('/api/connections', {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });
          if (!res.ok) {
            const errorBody = await res.json().catch(() => ({}));
            throw new Error(errorBody.error || 'Failed to save');
          }
          setStatus('保存しました。', 'ok');
        } catch (error) {
          console.error(error);
          setStatus('保存に失敗しました: ' + error.message, 'error');
        } finally {
          saveBtn.disabled = false;
        }
      });

      loadConnections();
      if (backBtn) {
        backBtn.addEventListener('click', () => {
          if (window.history.length > 1) {
            window.history.back();
          } else {
            window.location.href = '/connectors';
          }
        });
      }
    </script>
  </body>
</html>

  <div class="p-6 flex items-center gap-3">
    <div class="w-8 h-8 rounded bg-primary flex items-center justify-center text-white">
      <span class="material-symbols-outlined text-xl">auto_fix</span>
    </div>
    <h1 class="text-lg font-bold tracking-tight text-white">Orchestrator AI</h1>
  </div>

  <nav class="flex-1 px-4 py-2 space-y-1 overflow-y-auto custom-scrollbar">
    <div class="pb-4">
      <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2" data-i18n="nav.menu">メニュー</p>

      <a data-nav-key="dashboard" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/dashboard.html">

        <span class="text-sm font-medium" data-i18n="nav.dashboard">ダッシュボード</span>
      </a>

      <a data-nav-key="projects" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/projects.html">
        <span class="material-symbols-outlined">folder</span>
        <span class="text-sm font-medium" data-i18n="nav.projects">プロジェクト</span>
      </a>

      <a data-nav-key="analytics" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/analytics.html">
        <span class="material-symbols-outlined">bar_chart</span>
        <span class="text-sm font-medium" data-i18n="nav.analytics">アナリティクス</span>
      </a>

      <a data-nav-key="settings" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/settings.html">
        <span class="material-symbols-outlined">settings</span>
        <span class="text-sm font-medium" data-i18n="nav.settings">設定</span>
      </a>
    </div>

    <div class="pt-4 border-t border-primary/10">
      <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2" data-i18n="common.integrated_tools">連携済みツール</p>

      <a class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="#">
        <span class="material-symbols-outlined">polyline</span>
        <span class="text-sm font-medium" data-i18n="common.figma">Figma</span>
      </a>

      <a class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="#">
        <span class="material-symbols-outlined">terminal</span>
        <span class="text-sm font-medium" data-i18n="common.github">GitHub</span>
      </a>

  </nav>

  <div class="p-4 mt-auto border-t border-primary/10">
    <div class="flex items-center gap-3 p-2">
      <img
        alt="User Profile Picture"
        class="w-8 h-8 rounded-full border border-primary/20"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuB7g1BuuuJtIrUQvaUNmkGWbnrwaEFpf56L6eXfbs4zB6ZlLJ-duWDEsyNceOVVWnYnNmjlaN58YNLD80rulC9yvLlOV-zMhW2kyp3JfpqBhYlkKwmbxv-m9gFYFHDY32juGN6JKyuz09WQHsEtVP3hVWh4agUBqgJ8cMK7-p1E8VThLxTx-Z6CTJiHWHpN_MudwBuyN4jQYIQmoLgk1jr91D3jndnsRzFTZGWJ42GEODQfZiQFfsZOsWyhaL56JlrESnsxteMohPw"
      />
      <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold text-white truncate">田中 健一</p>
        <p class="text-xs text-slate-500 truncate">Pro Plan</p>

    </div>

</aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
      <header class="h-16 border-b border-border-dark px-8 flex items-center justify-between bg-background-light/50 dark:bg-background-dark/50 backdrop-blur-md z-10">
        <h2 class="text-xl font-bold" data-i18n="ui.settingsAi.title">設定 / Personal AI</h2>
        <a href="/ui/settings.html" class="text-xs text-primary hover:underline" data-i18n="ui.settingsAi.back">設定トップへ戻る</a>
      </header>

      <div class="flex-1 overflow-y-auto custom-scrollbar bg-background-light dark:bg-background-dark p-8">
        <div class="max-w-6xl space-y-6 pb-12">
          <section class="bg-white dark:bg-card-dark border border-primary/10 rounded-xl p-6">
            <h1 class="text-xl font-bold" data-i18n="ui.settingsAi.h1">個人AI設定</h1>
            <p class="mt-2 text-sm text-slate-500 dark:text-slate-300" data-i18n="ui.settingsAi.desc">provider / model / enabled / default を管理します。</p>
            <p class="mt-2 text-xs text-text-muted" data-i18n="ui.settingsAi.note">将来は複数AI接続や役割設定に拡張予定です（本フェーズは既定AI1件）。</p>
          </section>

          <section class="bg-white dark:bg-card-dark border border-primary/10 rounded-xl p-6">
            <div class="flex items-center justify-between gap-3">
              <h2 class="text-lg font-bold" data-i18n="ui.settingsAi.list.title">登録済みAI設定</h2>
              <button id="refresh-list" type="button" class="px-3 py-2 rounded-lg border border-border-dark text-sm hover:border-primary/40" data-i18n="common.retry">再試行</button>
            </div>
            <p id="list-status" class="mt-3 text-xs text-text-muted" data-i18n="common.loading">読み込み中</p>
            <div id="ai-settings-list" class="mt-4 grid grid-cols-1 lg:grid-cols-2 gap-3"></div>
          </section>

          <section class="bg-white dark:bg-card-dark border border-primary/10 rounded-xl p-6">
            <h2 class="text-lg font-bold" data-i18n="ui.settingsAi.form.title">AI設定の編集</h2>
            <form id="ai-settings-form" class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
              <input id="ai_setting_id" type="hidden" />
              <label class="text-sm">
                <span class="block text-xs text-slate-500" data-i18n="ui.settingsAi.form.provider">provider</span>
                <input id="provider" type="text" class="mt-1 w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm" placeholder="openai" required />
              </label>
              <label class="text-sm">
                <span class="block text-xs text-slate-500" data-i18n="ui.settingsAi.form.model">model</span>
                <input id="model" type="text" class="mt-1 w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm" placeholder="gpt-5-codex" required />
              </label>
              <label class="text-sm md:col-span-2">
                <span class="block text-xs text-slate-500" data-i18n="ui.settingsAi.form.secretRef">secret_ref</span>
                <input id="secret_ref" type="text" class="mt-1 w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm" placeholder="vault://provider/key" />
              </label>
              <label class="inline-flex items-center gap-2 text-sm">
                <input id="enabled" type="checkbox" checked />
                <span data-i18n="ui.settingsAi.form.enabled">enabled</span>
              </label>
              <label class="inline-flex items-center gap-2 text-sm">
                <input id="is_default" type="checkbox" />
                <span data-i18n="ui.settingsAi.form.default">default</span>
              </label>
              <div class="md:col-span-2 flex flex-wrap items-center gap-2">
                <button id="save-btn" type="submit" class="px-4 py-2 rounded-lg bg-primary text-white text-sm font-semibold hover:bg-primary/90" data-i18n="ui.settingsAi.form.save">保存</button>
                <button id="new-btn" type="button" class="px-4 py-2 rounded-lg border border-border-dark text-sm hover:border-primary/40" data-i18n="ui.settingsAi.form.new">新規作成モード</button>
                <span id="form-status" class="text-xs text-text-muted"></span>
              </div>
            </form>
          </section>
        </div>
      </div>
    </main>

    <script src="/ui/sidebar.js"></script>
    <script src="/ui/i18n/i18n.js" defer></script>
    <script type="module">
      import { apiGet, apiPost, apiPatch, setText, t } from "/ui/api.js";

      const listEl = document.getElementById("ai-settings-list");
      const listStatusEl = document.getElementById("list-status");
      const form = document.getElementById("ai-settings-form");
      const formStatusEl = document.getElementById("form-status");
      const saveBtn = document.getElementById("save-btn");
      const refreshBtn = document.getElementById("refresh-list");
      const newBtn = document.getElementById("new-btn");
      const idInput = document.getElementById("ai_setting_id");
      const providerInput = document.getElementById("provider");
      const modelInput = document.getElementById("model");
      const secretRefInput = document.getElementById("secret_ref");
      const enabledInput = document.getElementById("enabled");
      const defaultInput = document.getElementById("is_default");

      let items = [];

      function escapeHtml(text) {
        return String(text || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function fillForm(item = null) {
        if (!item) {
          idInput.value = "";
          providerInput.value = "";
          modelInput.value = "";
          secretRefInput.value = "";
          enabledInput.checked = true;
          defaultInput.checked = false;
          return;
        }
        idInput.value = item.ai_setting_id || "";
        providerInput.value = item.provider || "";
        modelInput.value = item.model || "";
        secretRefInput.value = item.secret_ref || "";
        enabledInput.checked = Boolean(item.enabled);
        defaultInput.checked = Boolean(item.is_default);
      }

      async function renderList(defaultId) {
        if (!listEl) return;
        if (!Array.isArray(items) || items.length === 0) {
          listEl.innerHTML = `<div class="text-sm text-text-muted">${escapeHtml(await t("ui.settingsAi.empty"))}</div>`;
          return;
        }
        const labels = {
          enabled: await t("ui.settingsAi.state.enabled"),
          disabled: await t("ui.settingsAi.state.disabled"),
          default: await t("ui.settingsAi.state.default"),
          setDefault: await t("ui.settingsAi.action.setDefault"),
          edit: await t("ui.settingsAi.action.edit")
        };

        listEl.innerHTML = items
          .map((item) => {
            const isDefault = item.ai_setting_id === defaultId || item.is_default;
            return `
              <article class="rounded-lg border border-primary/10 p-4" data-id="${escapeHtml(item.ai_setting_id)}">
                <div class="flex items-start justify-between gap-3">
                  <div>
                    <p class="font-semibold">${escapeHtml(item.provider)} / ${escapeHtml(item.model)}</p>
                    <p class="mt-1 text-xs text-text-muted">${escapeHtml(item.ai_setting_id)}</p>
                  </div>
                  <div class="flex items-center gap-2">
                    <span class="status-pill ${item.enabled ? "bg-emerald-500/20 text-emerald-300" : "bg-slate-500/20 text-slate-300"}">
                      ${item.enabled ? labels.enabled : labels.disabled}
                    </span>
                    ${isDefault ? `<span class="status-pill bg-primary/20 text-primary">${labels.default}</span>` : ""}
                  </div>
                </div>
                <div class="mt-3 flex flex-wrap items-center gap-2">
                  <button type="button" class="btn-edit px-3 py-1.5 rounded-lg border border-border-dark text-xs hover:border-primary/40">${labels.edit}</button>
                  ${isDefault ? "" : `<button type="button" class="btn-default px-3 py-1.5 rounded-lg border border-border-dark text-xs hover:border-primary/40">${labels.setDefault}</button>`}
                </div>
              </article>
            `;
          })
          .join("");

        listEl.querySelectorAll(".btn-edit").forEach((btn) => {
          btn.addEventListener("click", (event) => {
            const card = event.target.closest("article[data-id]");
            if (!card) return;
            const id = card.getAttribute("data-id") || "";
            const item = items.find((it) => it.ai_setting_id === id);
            fillForm(item || null);
          });
        });

        listEl.querySelectorAll(".btn-default").forEach((btn) => {
          btn.addEventListener("click", async (event) => {
            const card = event.target.closest("article[data-id]");
            if (!card) return;
            const id = card.getAttribute("data-id") || "";
            try {
              await apiPatch(`/me/ai-settings/${encodeURIComponent(id)}`, { is_default: true });
              await load();
            } catch (error) {
              formStatusEl.textContent = String((error && error.message) || "failed");
            }
          });
        });
      }

      async function load() {
        if (listStatusEl) await setText(listStatusEl, "common.loading", true);
        try {
          const payload = await apiGet("/me/ai-settings");
          items = Array.isArray(payload.items) ? payload.items : [];
          await renderList(payload.default_ai_setting_id || "");
          if (listStatusEl) listStatusEl.textContent = "";
          if (!idInput.value && items.length > 0) {
            fillForm(items[0]);
          }
        } catch (error) {
          items = [];
          if (listEl) {
            listEl.innerHTML = "";
          }
          if (listStatusEl) listStatusEl.textContent = String((error && error.message) || "failed");
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (formStatusEl) formStatusEl.textContent = "";
        if (saveBtn) saveBtn.disabled = true;
        const payload = {
          provider: providerInput.value.trim(),
          model: modelInput.value.trim(),
          secret_ref: secretRefInput.value.trim(),
          enabled: Boolean(enabledInput.checked),
          is_default: Boolean(defaultInput.checked),
        };
        try {
          const id = idInput.value.trim();
          if (id) {
            await apiPatch(`/me/ai-settings/${encodeURIComponent(id)}`, payload);
          } else {
            await apiPost("/me/ai-settings", payload);
          }
          if (formStatusEl) formStatusEl.textContent = await t("ui.settingsAi.saved");
          await load();
        } catch (error) {
          if (formStatusEl) formStatusEl.textContent = String((error && error.message) || "failed");
        } finally {
          if (saveBtn) saveBtn.disabled = false;
        }
      });

      if (newBtn) {
        newBtn.addEventListener("click", () => {
          fillForm(null);
          if (formStatusEl) formStatusEl.textContent = "";
        });
      }
      if (refreshBtn) {
        refreshBtn.addEventListener("click", () => {
          load();
        });
      }

      fillForm(null);
      load();
    </script>
  </body>
</html>

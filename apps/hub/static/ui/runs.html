    <main class="flex-1 flex flex-col h-screen overflow-hidden min-w-0">

      <div class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-8">
        <section class="bg-white dark:bg-card-dark border border-border-dark rounded-xl p-6">
          <div class="flex flex-wrap items-start justify-between gap-3">
            <div>
              <h1 class="text-xl font-bold" data-i18n="ui.runs.h1">実行一覧</h1>

            <button id="create-run-button" class="px-4 py-2 rounded-lg bg-primary text-white text-sm font-semibold hover:bg-primary/90 transition-colors" type="button" data-i18n="ui.runs.action.createRun">
              新規Run
            </button>
          </div>

          <div class="mt-6 overflow-x-auto rounded-lg border border-border-dark">
            <table class="min-w-full text-sm">
              <thead class="bg-slate-100 dark:bg-background-dark/70">
                <tr class="text-left text-slate-600 dark:text-slate-300">
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.runs.col.runId">runId</th>
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.runs.col.jobType">jobType</th>
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.runs.col.status">status</th>
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.runs.col.updated">updated</th>
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.runs.col.target">target</th>
                </tr>
              </thead>
              <tbody id="runs-table-body"></tbody>
            </table>
          </div>

          <div id="runs-feedback" class="mt-4 text-sm text-text-muted" data-i18n="common.loading">読み込み中</div>
          <button id="runs-retry" class="mt-2 px-3 py-2 rounded-lg border border-border-dark text-sm hover:bg-slate-100 dark:hover:bg-background-dark/80 hidden" type="button" data-i18n="common.retry">
            再試行
          </button>

          <div id="runs-empty-state" class="mt-6 rounded-lg border border-dashed border-border-dark p-6 text-center hidden">
            <p class="text-sm font-semibold" data-i18n="ui.runs.empty.title">Runがまだありません</p>
            <p class="mt-1 text-xs text-text-muted" data-i18n="ui.runs.empty.desc">新規Runを作成するとここに表示されます。</p>
          </div>
        </section>
      </div>
    </main>

    <script src="/ui/sidebar.js"></script>
    <script src="/ui/i18n/i18n.js" defer></script>
    <script type="module">
      import { apiGet, apiPost, setText, t } from "/ui/api.js";

      const tbody = document.getElementById("runs-table-body");
      const feedback = document.getElementById("runs-feedback");
      const retry = document.getElementById("runs-retry");
      const empty = document.getElementById("runs-empty-state");
      const createButton = document.getElementById("create-run-button");

      function toggleEmpty(show) {
        if (!empty) return;
        empty.classList.toggle("hidden", !show);
      }

      function clearRows() {
        if (tbody) tbody.innerHTML = "";
      }

      function buildStatusBadge(status) {
        const value = String(status || "-");
        const badge = document.createElement("span");
        badge.className = "inline-flex px-2 py-1 rounded-full text-xs";
        if (value === "ok" || value === "completed") {
          badge.classList.add("bg-emerald-500/15", "text-emerald-500");
        } else if (value === "running" || value === "pending") {
          badge.classList.add("bg-amber-500/15", "text-amber-500");
        } else {
          badge.classList.add("bg-rose-500/15", "text-rose-500");
        }
        badge.textContent = value;
        return badge;
      }

      function appendRow(run) {
        if (!tbody) return;
        const tr = document.createElement("tr");
        tr.className = "border-t border-border-dark";

        const runId = String(run.run_id || "-");
        const jobType = String(run.job_type || "-");
        const status = String(run.status || "-");
        const updated = String(run.created_at || run.updated_at || "-");
        const target = run.figma_file_key ? String(run.figma_file_key) : "-";

        const tdRun = document.createElement("td");
        tdRun.className = "px-4 py-3 font-mono text-xs";
        const a = document.createElement("a");
        a.href = `/ui/run.html?run_id=${encodeURIComponent(runId)}`;
        a.className = "text-primary hover:underline";
        a.textContent = runId;
        tdRun.appendChild(a);

        const tdJob = document.createElement("td");
        tdJob.className = "px-4 py-3";
        tdJob.textContent = jobType;

        const tdStatus = document.createElement("td");
        tdStatus.className = "px-4 py-3";
        tdStatus.appendChild(buildStatusBadge(status));

        const tdUpdated = document.createElement("td");
        tdUpdated.className = "px-4 py-3";
        tdUpdated.textContent = updated;

        const tdTarget = document.createElement("td");
        tdTarget.className = "px-4 py-3";
        tdTarget.textContent = target;

        tr.append(tdRun, tdJob, tdStatus, tdUpdated, tdTarget);
        tbody.appendChild(tr);
      }

      async function loadRuns() {
        clearRows();
        toggleEmpty(false);
        retry.classList.add("hidden");
        await setText(feedback, "common.loading", true);

        try {
          const payload = await apiGet("/runs");
          const runs = Array.isArray(payload && payload.runs) ? payload.runs : [];
          if (runs.length === 0) {
            feedback.textContent = "";
            toggleEmpty(true);
            return;
          }
          runs.forEach(appendRow);
          feedback.textContent = "";
        } catch (error) {
          const msg = await t("common.error");
          feedback.textContent = `${msg}: ${error && error.message ? error.message : "unknown"}`;
          retry.classList.remove("hidden");
          toggleEmpty(false);
        }
      }

      retry.addEventListener("click", loadRuns);
      createButton.addEventListener("click", async () => {
        try {
          createButton.disabled = true;
          const result = await apiPost("/runs", {
            job_type: "integration_hub.phase1.code_to_figma_from_url",
            inputs: {
              url: "https://example.com",
            },
          });
          const runId = result && result.run_id ? String(result.run_id) : "";
          if (!runId) {
            throw new Error("missing run_id");
          }
          window.location.href = `/ui/run.html?run_id=${encodeURIComponent(runId)}`;
        } catch (error) {
          const msg = await t("ui.runs.create.failed");
          feedback.textContent = `${msg}: ${error && error.message ? error.message : "unknown"}`;
          retry.classList.remove("hidden");
        } finally {
          createButton.disabled = false;
        }
      });
      loadRuns();
    </script>

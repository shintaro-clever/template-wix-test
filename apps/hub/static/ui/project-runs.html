<!DOCTYPE html>
<html class="dark" lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Orchestrator AI - Project Runs</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = { darkMode:"class", theme:{ extend:{ colors:{
      primary:"#a55c50","background-light":"#f7f6f6","background-dark":"#1d1615",
      "card-dark":"#251f1e","border-dark":"#3d3432","text-muted":"#b1a7a5"
    }, fontFamily:{display:["Inter","sans-serif"]}, borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem",full:"9999px"} } } };
  </script>
  <style>
    body{font-family:'Inter',"Noto Sans JP",sans-serif;}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
    .custom-scrollbar::-webkit-scrollbar{width:6px;height:6px;}
    .custom-scrollbar::-webkit-scrollbar-thumb{background:#3d3432;border-radius:10px;}
  </style>
</head>
<body data-page="projects" class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex overflow-hidden">
  <aside class="w-64 flex-shrink-0 border-r border-primary/10 bg-background-dark flex flex-col h-screen">
  <div class="p-6 flex items-center gap-3">
    <div class="w-8 h-8 rounded bg-primary flex items-center justify-center text-white">
      <span class="material-symbols-outlined text-xl">auto_fix</span>
    </div>
    <h1 class="text-lg font-bold tracking-tight text-white">Orchestrator AI</h1>
  </div>

  <nav class="flex-1 px-4 py-2 space-y-1 overflow-y-auto custom-scrollbar">
    <div class="pb-4">
      <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2" data-i18n="nav.menu">メニュー</p>

      <a data-nav-key="dashboard" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/dashboard.html">
        <span class="material-symbols-outlined">dashboard</span>
        <span class="text-sm font-medium" data-i18n="nav.dashboard">ダッシュボード</span>
      </a>

      <a data-nav-key="projects" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/projects.html">
        <span class="material-symbols-outlined">folder</span>
        <span class="text-sm font-medium" data-i18n="nav.projects">プロジェクト</span>
      </a>

      <a data-nav-key="analytics" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/analytics.html">
        <span class="material-symbols-outlined">bar_chart</span>
        <span class="text-sm font-medium" data-i18n="nav.analytics">アナリティクス</span>
      </a>

      <a data-nav-key="settings" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/settings.html">
        <span class="material-symbols-outlined">settings</span>
        <span class="text-sm font-medium" data-i18n="nav.settings">設定</span>
      </a>
    </div>

    <div class="pt-4 border-t border-primary/10">
      <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2" data-i18n="common.integrated_tools">連携済みツール</p>

      <a class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="#">
        <span class="material-symbols-outlined">polyline</span>
        <span class="text-sm font-medium" data-i18n="common.figma">Figma</span>
      </a>

      <a class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="#">
        <span class="material-symbols-outlined">terminal</span>
        <span class="text-sm font-medium" data-i18n="common.github">GitHub</span>
      </a>
    </div>
  </nav>
</aside>

  <main class="flex-1 flex flex-col h-screen overflow-hidden min-w-0">
    <header class="h-16 border-b border-border-dark px-6 md:px-8 flex items-center justify-between bg-background-light/50 dark:bg-background-dark/50 backdrop-blur-md z-10">
      <h2 class="text-xl font-bold"><span data-i18n="ui.projectRuns.title">Project Runs</span></h2>
      <a id="back-link" href="/ui/project.html" class="inline-flex items-center gap-2 text-sm font-semibold text-primary hover:underline">
        <span class="material-symbols-outlined text-base">arrow_back</span>
        <span data-i18n="ui.projectRuns.back">プロジェクト概要へ戻る</span>
      </a>
    </header>

    <div class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar space-y-6">
      <section class="bg-white dark:bg-card-dark p-5 rounded-xl border border-border-dark">
        <h1 class="text-sm font-semibold" data-i18n="ui.projectRuns.h1">プロジェクト Run</h1>
        <p class="mt-1 text-xs text-text-muted" data-i18n="ui.projectRuns.desc">このプロジェクトのRun履歴を確認します。</p>

        <div id="runs-loading" class="mt-4 text-sm text-text-muted" data-i18n="ui.projectRuns.loading">読み込み中...</div>

        <div id="runs-error" class="mt-4 hidden">
          <p id="runs-error-msg" class="text-sm text-rose-500"></p>
          <button id="runs-retry" class="mt-2 px-3 py-2 rounded-lg border border-border-dark text-sm hover:bg-slate-100 dark:hover:bg-background-dark/80" type="button" data-i18n="ui.projectRuns.retry">再試行</button>
        </div>

        <div id="runs-content" class="mt-4 hidden">
          <div class="overflow-x-auto rounded-lg border border-border-dark">
            <table class="min-w-full text-sm">
              <thead class="bg-slate-100 dark:bg-background-dark/70">
                <tr class="text-left text-slate-600 dark:text-slate-300">
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.projectRuns.col.runId">run_id</th>
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.projectRuns.col.jobType">job_type</th>
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.projectRuns.col.status">status</th>
                  <th class="px-4 py-3 font-semibold" data-i18n="ui.projectRuns.col.updated">更新日時</th>
                </tr>
              </thead>
              <tbody id="runs-tbody"></tbody>
            </table>
          </div>

          <div id="runs-empty" class="mt-6 rounded-lg border border-dashed border-border-dark p-6 text-center hidden">
            <p class="text-sm font-semibold" data-i18n="ui.projectRuns.empty.title">Runがまだありません</p>
            <p class="mt-1 text-xs text-text-muted" data-i18n="ui.projectRuns.empty.desc">このプロジェクトで作成されたRunがここに表示されます。</p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="/ui/sidebar.js"></script>
  <script src="/ui/i18n/i18n.js" defer></script>
  <script type="module">
    import { apiGet, setText, t } from "/ui/api.js";

    const params = new URLSearchParams(window.location.search || "");
    const projectId = (params.get("project_id") || "").trim();

    const loadingEl = document.getElementById("runs-loading");
    const errorEl = document.getElementById("runs-error");
    const errorMsg = document.getElementById("runs-error-msg");
    const retryBtn = document.getElementById("runs-retry");
    const contentEl = document.getElementById("runs-content");
    const tbodyEl = document.getElementById("runs-tbody");
    const emptyEl = document.getElementById("runs-empty");
    const backLink = document.getElementById("back-link");

    if (projectId && backLink) {
      const url = new URL(backLink.href, window.location.origin);
      url.searchParams.set("project_id", projectId);
      backLink.href = `${url.pathname}${url.search}`;
    }

    function showLoading() {
      loadingEl.classList.remove("hidden");
      errorEl.classList.add("hidden");
      contentEl.classList.add("hidden");
    }

    function showError(msg) {
      loadingEl.classList.add("hidden");
      errorMsg.textContent = msg;
      errorEl.classList.remove("hidden");
      contentEl.classList.add("hidden");
    }

    function buildStatusBadge(status) {
      const value = String(status || "-");
      const badge = document.createElement("span");
      badge.className = "inline-flex px-2 py-1 rounded-full text-xs";
      if (value === "ok" || value === "completed" || value === "succeeded") {
        badge.classList.add("bg-emerald-500/15", "text-emerald-500");
      } else if (value === "running" || value === "queued") {
        badge.classList.add("bg-amber-500/15", "text-amber-500");
      } else {
        badge.classList.add("bg-rose-500/15", "text-rose-500");
      }
      badge.textContent = value;
      return badge;
    }

    function renderRuns(runs) {
      tbodyEl.innerHTML = "";
      loadingEl.classList.add("hidden");
      errorEl.classList.add("hidden");
      contentEl.classList.remove("hidden");

      if (runs.length === 0) {
        emptyEl.classList.remove("hidden");
        return;
      }
      emptyEl.classList.add("hidden");

      for (const run of runs) {
        const tr = document.createElement("tr");
        tr.className = "border-t border-border-dark";

        const tdId = document.createElement("td");
        tdId.className = "px-4 py-3 font-mono text-xs";
        const a = document.createElement("a");
        a.href = `/ui/run.html?run_id=${encodeURIComponent(run.run_id || "")}`;
        a.className = "text-primary hover:underline";
        a.textContent = String(run.run_id || "-");
        tdId.appendChild(a);

        const tdJob = document.createElement("td");
        tdJob.className = "px-4 py-3 text-xs";
        tdJob.textContent = String(run.job_type || "-");

        const tdStatus = document.createElement("td");
        tdStatus.className = "px-4 py-3";
        tdStatus.appendChild(buildStatusBadge(run.status));

        const tdUpdated = document.createElement("td");
        tdUpdated.className = "px-4 py-3 text-xs";
        tdUpdated.textContent = String(run.updated_at || run.created_at || "-");

        tr.append(tdId, tdJob, tdStatus, tdUpdated);
        tbodyEl.appendChild(tr);
      }
    }

    async function loadRuns() {
      showLoading();

      if (!projectId) {
        const msg = await t("ui.projectRuns.missingProjectId");
        showError(msg);
        return;
      }

      try {
        const payload = await apiGet(`/projects/${encodeURIComponent(projectId)}/runs`);
        const runs = Array.isArray(payload && payload.runs) ? payload.runs : [];
        renderRuns(runs);
      } catch (e) {
        const label = await t("ui.projectRuns.error.title");
        showError(`${label}: ${e && e.message ? e.message : "unknown"}`);
      }
    }

    retryBtn.addEventListener("click", loadRuns);
    loadRuns();
  </script>
</body>
</html>

<!DOCTYPE html>
<html class="dark" lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Orchestrator AI - 設定 / 外観</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#a55c50",
              "background-light": "#f7f6f6",
              "background-dark": "#1d1615",
              "border-dark": "#3d3432",
              "text-muted": "#b1a7a5",
              "card-dark": "#251f1e"
            },
            fontFamily: { display: ["Inter", "sans-serif"] },
            borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" }
          }
        }
      };
    </script>

    <style>
      body { font-family: "Inter", "Noto Sans JP", sans-serif; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(165, 92, 80, 0.2); border-radius: 10px; }
    </style>
  </head>

  <body data-page="settings" class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display flex h-screen overflow-hidden">
    <!--#include virtual="partials/sidebar.html" -->
    <!-- include: partials/sidebar.html -->

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
      <!--#include virtual="partials/header.html" -->
      <!-- include: partials/header.html (replace {{PAGE_TITLE}} -> 設定, {{HEADER_RIGHT_CONTENT}} -> <div class="text-xs text-text-muted">Appearance</div>) -->

      <div class="bg-background-light dark:bg-background-dark px-8 pt-6 border-b border-primary/10">
        <nav class="flex flex-wrap gap-6">
          <a class="pb-4 text-sm font-semibold text-slate-500 hover:text-primary border-b-2 border-transparent" href="/ui/settings.html">プロフィール</a>
          <a class="pb-4 text-sm font-semibold text-slate-500 hover:text-primary border-b-2 border-transparent" href="/ui/settings-connections.html">連携ツール</a>
          <a class="pb-4 text-sm font-semibold text-slate-500 hover:text-primary border-b-2 border-transparent" href="/ui/settings-connections.html">接続管理 (Connections)</a>
          <a class="pb-4 text-sm font-semibold text-slate-500 hover:text-primary border-b-2 border-transparent" href="/ui/settings-drive.html">Drive出力先</a>
          <a class="pb-4 text-sm font-semibold text-primary border-b-2 border-primary" href="/ui/settings-appearance.html">外観</a>
          <a class="pb-4 text-sm font-semibold text-slate-500 hover:text-primary border-b-2 border-transparent" href="/ui/settings-language.html">言語</a>
        </nav>
      </div>

      <div class="flex-1 overflow-y-auto custom-scrollbar bg-background-light dark:bg-background-dark p-8">
        <div class="max-w-4xl space-y-10 pb-20">
          <section>
            <div class="mb-6">
              <h3 class="text-lg font-bold mb-1">外観設定</h3>
              <p class="text-sm text-slate-500">UIの表示スタイルをカスタマイズします。</p>
            </div>

            <div class="bg-white dark:bg-white/5 border border-primary/10 rounded-xl p-6 shadow-sm space-y-10">
              <div class="flex items-center justify-between">
                <div>
                  <p class="font-bold">ダークモード</p>
                  <p class="text-xs text-slate-500">深夜の作業に適した暗い配色を使用します。</p>
                </div>
                <button class="w-12 h-6 bg-primary rounded-full relative transition-colors" aria-label="ダークモード切替（MVP: 見た目のみ）">
                  <div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></div>
                </button>
              </div>

              <div class="space-y-4">
                <div>
                  <p class="font-bold">テーマカラー</p>
                  <p class="text-xs text-slate-500">主要アクセント色を選択します（MVP: 選択状態の表示のみ）。</p>
                </div>

                <div class="flex flex-wrap gap-4">
                  <button class="w-10 h-10 rounded-full bg-[#a55c50] border-4 border-white dark:border-slate-800 ring-2 ring-primary shadow-lg" aria-label="テーマカラー: Primary（選択中）"></button>
                  <button class="w-10 h-10 rounded-full bg-slate-700 hover:scale-110 transition-transform shadow" aria-label="テーマカラー: Slate"></button>
                  <button class="w-10 h-10 rounded-full bg-indigo-600 hover:scale-110 transition-transform shadow" aria-label="テーマカラー: Indigo"></button>
                  <button class="w-10 h-10 rounded-full bg-emerald-600 hover:scale-110 transition-transform shadow" aria-label="テーマカラー: Emerald"></button>
                  <button class="w-10 h-10 rounded-full bg-amber-500 hover:scale-110 transition-transform shadow" aria-label="テーマカラー: Amber"></button>
                </div>
              </div>

              <div class="space-y-3">
                <div>
                  <p class="font-bold">表示密度</p>
                  <p class="text-xs text-slate-500">一覧やカードの余白を調整します（MVP: UIのみ）。</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                  <label class="flex items-center gap-3 p-4 rounded-xl border border-primary/10 bg-background-light dark:bg-background-dark cursor-pointer hover:border-primary/30 transition-all">
                    <input type="radio" name="density" class="text-primary" checked />
                    <div>
                      <p class="text-sm font-bold">標準</p>
                      <p class="text-xs text-slate-500">バランス</p>
                    </div>
                  </label>

                  <label class="flex items-center gap-3 p-4 rounded-xl border border-primary/10 bg-background-light dark:bg-background-dark cursor-pointer hover:border-primary/30 transition-all">
                    <input type="radio" name="density" class="text-primary" />
                    <div>
                      <p class="text-sm font-bold">コンパクト</p>
                      <p class="text-xs text-slate-500">情報量重視</p>
                    </div>
                  </label>

                  <label class="flex items-center gap-3 p-4 rounded-xl border border-primary/10 bg-background-light dark:bg-background-dark cursor-pointer hover:border-primary/30 transition-all">
                    <input type="radio" name="density" class="text-primary" />
                    <div>
                      <p class="text-sm font-bold">ゆったり</p>
                      <p class="text-xs text-slate-500">視認性重視</p>
                    </div>
                  </label>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="/ui/sidebar.js"></script>
  </body>
</html>

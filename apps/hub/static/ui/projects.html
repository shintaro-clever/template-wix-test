  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

    tailwind.config = { darkMode:"class", theme:{ extend:{ colors:{
      primary:"#a55c50","background-light":"#f7f6f6","background-dark":"#1d1615",
      "card-dark":"#251f1e","border-dark":"#3d3432","text-muted":"#b1a7a5"
    }, fontFamily:{display:["Inter","sans-serif"]}, borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem",full:"9999px"} } } };

  <style>
    body{font-family:'Inter',"Noto Sans JP",sans-serif;}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
    .custom-scrollbar::-webkit-scrollbar{width:6px;height:6px;}
    .custom-scrollbar::-webkit-scrollbar-thumb{background:#3d3432;border-radius:10px;}
    .status-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:700;line-height:1;}
  </style>
</head>
<body data-page="projects" class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex overflow-hidden">
  <aside class="w-64 flex-shrink-0 border-r border-primary/10 bg-background-dark flex flex-col h-screen">
  <div class="p-6 flex items-center gap-3">
    <div class="w-8 h-8 rounded bg-primary flex items-center justify-center text-white">
      <span class="material-symbols-outlined text-xl">auto_fix</span>
    </div>
    <h1 class="text-lg font-bold tracking-tight text-white">Orchestrator AI</h1>
  </div>

  <nav class="flex-1 px-4 py-2 space-y-1 overflow-y-auto custom-scrollbar">
    <div class="pb-4">
      <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">メニュー</p>

      <a data-nav-key="dashboard" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/dashboard.html">
        <span class="material-symbols-outlined">dashboard</span>
        <span class="text-sm font-medium">ダッシュボード</span>
      </a>

      <a data-nav-key="projects" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/projects.html">
        <span class="material-symbols-outlined">folder</span>
        <span class="text-sm font-medium">プロジェクト</span>
      </a>

      <a data-nav-key="analytics" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/analytics.html">
        <span class="material-symbols-outlined">bar_chart</span>
        <span class="text-sm font-medium">アナリティクス</span>
      </a>

      <a data-nav-key="settings" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/settings.html">
        <span class="material-symbols-outlined">settings</span>
        <span class="text-sm font-medium">設定</span>
      </a>
    </div>

    <div class="pt-4 border-t border-primary/10">
      <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">連携済みツール</p>

      <a class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="#">
        <span class="material-symbols-outlined">polyline</span>
        <span class="text-sm font-medium">Figma</span>
      </a>

      <a class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="#">
        <span class="material-symbols-outlined">terminal</span>
        <span class="text-sm font-medium">GitHub</span>
      </a>
    </div>
  </nav>

  <div class="p-4 mt-auto border-t border-primary/10">
    <div class="flex items-center gap-3 p-2">
      <img
        alt="User Profile Picture"
        class="w-8 h-8 rounded-full border border-primary/20"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuB7g1BuuuJtIrUQvaUNmkGWbnrwaEFpf56L6eXfbs4zB6ZlLJ-duWDEsyNceOVVWnYnNmjlaN58YNLD80rulC9yvLlOV-zMhW2kyp3JfpqBhYlkKwmbxv-m9gFYFHDY32juGN6JKyuz09WQHsEtVP3hVWh4agUBqgJ8cMK7-p1E8VThLxTx-Z6CTJiHWHpN_MudwBuyN4jQYIQmoLgk1jr91D3jndnsRzFTZGWJ42GEODQfZiQFfsZOsWyhaL56JlrESnsxteMohPw"
      />
      <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold text-white truncate">田中 健一</p>
        <p class="text-xs text-slate-500 truncate">Pro Plan</p>
      </div>
    </div>
  </div>
</aside>

  <main class="flex-1 flex flex-col h-screen overflow-hidden min-w-0">
    <header class="h-16 border-b border-border-dark px-6 md:px-8 flex items-center justify-between bg-background-light/50 dark:bg-background-dark/50 backdrop-blur-md z-10">
      <h2 class="text-xl font-bold">Projects</h2>
      <button class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-primary text-white text-sm font-semibold hover:bg-primary/90">
        <span class="material-symbols-outlined text-base">add</span>
        新規作成
      </button>
    </header>

    <div class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar space-y-6">
      <section class="bg-white dark:bg-card-dark p-4 md:p-5 rounded-xl border border-border-dark">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-3">
          <label class="lg:col-span-2 block">
            <span class="text-xs text-text-muted">検索</span>
            <div class="relative mt-1">
              <span class="material-symbols-outlined absolute left-3 top-2.5 text-slate-400 text-base">search</span>
              <input class="w-full pl-9 pr-3 py-2 rounded-lg border border-border-dark bg-background-light dark:bg-background-dark text-sm" placeholder="プロジェクト名 / ID で検索" type="text" value=""/>
            </div>
          </label>

          <label class="block">
            <span class="text-xs text-text-muted">ステータス</span>
            <select class="mt-1 w-full rounded-lg border border-border-dark bg-background-light dark:bg-background-dark text-sm px-3 py-2">
              <option>すべて</option>
              <option>進行中</option>
              <option>レビュー中</option>
              <option>完了</option>
              <option>停止中</option>
            </select>
          </label>

          <label class="block">
            <span class="text-xs text-text-muted">ソート</span>
            <select class="mt-1 w-full rounded-lg border border-border-dark bg-background-light dark:bg-background-dark text-sm px-3 py-2">
              <option>最終更新順</option>
              <option>進捗順</option>
              <option>名前順</option>
              <option>作成日順</option>
            </select>
          </label>
        </div>
      </section>

      <div id="projects-api-error" class="hidden rounded-lg border border-rose-300/40 bg-rose-50 dark:bg-rose-900/10 px-4 py-3 text-xs text-rose-700 dark:text-rose-300"></div>

      <section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4" data-projects-list>
        <article class="bg-white dark:bg-card-dark border border-border-dark rounded-xl p-5">
          <p class="text-sm text-text-muted">読み込み中...</p>
        </article>
      </section>

      <section class="bg-white dark:bg-card-dark border border-dashed border-border-dark rounded-xl p-6 text-center hidden" data-projects-empty>
        <span class="material-symbols-outlined text-3xl text-text-muted">folder_off</span>
        <h3 class="mt-2 text-base font-bold">プロジェクトが0件です</h3>
        <p class="text-sm text-text-muted mt-1">新規作成から最初のプロジェクトを作成してください（空状態UI）。</p>
        <button class="mt-4 inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-primary text-white text-sm font-semibold hover:bg-primary/90">
          <span class="material-symbols-outlined text-base">add</span>
          新規プロジェクトを作成
        </button>
      </section>
    </div>
  </main>

  <script src="/ui/sidebar.js"></script>
  <script type="module">
    const listEl = document.querySelector("[data-projects-list]");
    const emptyEl = document.querySelector("[data-projects-empty]");
    const errEl = document.getElementById("projects-api-error");
    const esc = (s) => (s ?? "").toString().replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
    const normItems = (payload) => Array.isArray(payload) ? payload : (payload && Array.isArray(payload.items) ? payload.items : []);

    function statusClass(status) {
      const s = String(status || "").toLowerCase();
      if (["done","completed","success","closed"].includes(s)) return "bg-emerald-500/15 text-emerald-700 dark:text-emerald-300 border border-emerald-500/30";
      if (["review","in_review","reviewing"].includes(s)) return "bg-sky-500/15 text-sky-700 dark:text-sky-300 border border-sky-500/30";
      if (["error","failed","stopped"].includes(s)) return "bg-rose-500/15 text-rose-700 dark:text-rose-300 border border-rose-500/30";
      return "bg-amber-500/15 text-amber-700 dark:text-amber-300 border border-amber-500/30";
    }

    async function fetchJson(url) {
      const res = await fetch(url, { headers: { "Accept": "application/json" } });
      const text = await res.text();
      let json = null;
      try { json = text ? JSON.parse(text) : null; } catch (_) {}
      if (!res.ok) throw new Error((json && (json.message || json.error)) || text || `HTTP ${res.status}`);
      return json;
    }

    async function load() {
      try {
        const projectsRaw = await fetchJson("/api/projects");
        const projects = normItems(projectsRaw);
        if (!projects.length) {
          listEl.innerHTML = "";
          emptyEl.classList.remove("hidden");
        } else {
          emptyEl.classList.add("hidden");
          listEl.innerHTML = projects.map((p) => {
            const name = p.name || p.title || p.project_name || "Untitled project";
            const key = p.id || p.project_id || p.slug || "-";
            const status = p.status || "進行中";
            const progress = Number.isFinite(Number(p.progress)) ? Math.max(0, Math.min(100, Number(p.progress))) : 0;
            const updated = p.updated_at || p.updatedAt || p.created_at || "-";
            return `<article class="bg-white dark:bg-card-dark border border-border-dark rounded-xl p-5 hover:border-primary/40 transition-colors">
              <div class="flex items-start justify-between gap-3">
                <div><h3 class="font-bold">${esc(name)}</h3><p class="text-xs text-text-muted mt-1">${esc(key)}</p></div>
                <span class="status-badge ${statusClass(status)}">${esc(status)}</span>
              </div>
              <p class="text-xs text-text-muted mt-4">最終更新: ${esc(updated)}</p>
              <div class="mt-3">
                <div class="flex items-center justify-between text-xs mb-1"><span class="text-text-muted">進捗</span><span>${progress}%</span></div>
                <div class="h-2 rounded-full bg-border-dark/40 overflow-hidden"><div class="h-full bg-primary" style="width:${progress}%"></div></div>
              </div>
            </article>`;
          }).join("");
        }
        errEl.classList.add("hidden");
      } catch (e) {
        errEl.textContent = `API取得に失敗: ${e.message}`;
        errEl.classList.remove("hidden");
        listEl.innerHTML = "";
        emptyEl.classList.remove("hidden");
      }
    }

    load();
  </script>
</body>
</html>

<!DOCTYPE html>
<html class="dark" lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Orchestrator AI - Project Settings</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#a55c50",
              "background-light": "#f7f6f6",
              "background-dark": "#1d1615",
              "card-dark": "#251f1e",
              "border-dark": "#3d3432",
              "text-muted": "#b1a7a5"
            },
            fontFamily: { display: ["Inter", "sans-serif"] }
          }
        }
      };
    </script>
    <style>
      body { font-family: "Inter", "Noto Sans JP", sans-serif; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #3d3432; border-radius: 10px; }
    </style>
  </head>
  <body data-page="projects" class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex overflow-hidden">
    <aside class="w-64 flex-shrink-0 border-r border-primary/10 bg-background-dark flex flex-col h-screen">
      <div class="p-6 flex items-center gap-3">
        <div class="w-8 h-8 rounded bg-primary flex items-center justify-center text-white">
          <span class="material-symbols-outlined text-xl">auto_fix</span>
        </div>
        <h1 class="text-lg font-bold tracking-tight text-white">Orchestrator AI</h1>
      </div>

      <nav class="flex-1 px-4 py-2 space-y-1 overflow-y-auto custom-scrollbar">
        <div class="pb-4">
          <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2" data-i18n="nav.menu">メニュー</p>
          <a data-nav-key="dashboard" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/dashboard.html"><span class="material-symbols-outlined">dashboard</span><span class="text-sm font-medium" data-i18n="nav.dashboard">ダッシュボード</span></a>
          <a data-nav-key="projects" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/projects.html"><span class="material-symbols-outlined">folder</span><span class="text-sm font-medium" data-i18n="nav.projects">プロジェクト</span></a>
          <a data-nav-key="analytics" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/analytics.html"><span class="material-symbols-outlined">bar_chart</span><span class="text-sm font-medium" data-i18n="nav.analytics">アナリティクス</span></a>
          <a data-nav-key="settings" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/settings.html"><span class="material-symbols-outlined">settings</span><span class="text-sm font-medium" data-i18n="nav.settings">設定</span></a>
        </div>
      </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden min-w-0">
      <header class="h-16 border-b border-border-dark px-8 flex items-center justify-between bg-background-light/50 dark:bg-background-dark/50 backdrop-blur-md z-10">
        <h2 class="text-xl font-bold" data-i18n="ui.projectSettings.title">Project Settings</h2>
        <a id="back-link" class="bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg text-sm font-bold" href="/ui/project.html" data-i18n="ui.projectSettings.back">概要へ戻る</a>
      </header>

      <div class="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-8 space-y-6">
        <section class="bg-white dark:bg-card-dark rounded-xl border border-border-dark p-5">
          <h3 class="text-base font-bold" data-i18n="ui.projectSettings.h1">共有環境設定</h3>
          <p class="text-sm text-text-muted mt-2" data-i18n="ui.projectSettings.desc">プロジェクト参加メンバーで共通利用する GitHub / Figma / Drive を設定します。</p>
          <p id="feedback" class="mt-3 text-sm text-text-muted" data-i18n="common.loading">読み込み中</p>
          <button id="retry" type="button" class="mt-2 px-3 py-2 rounded-lg border border-border-dark text-sm hover:bg-slate-100 dark:hover:bg-background-dark/80 hidden" data-i18n="common.retry">再試行</button>
        </section>

        <section class="bg-white dark:bg-card-dark rounded-xl border border-border-dark p-5">
          <form id="settings-form" class="grid grid-cols-1 gap-4 max-w-3xl">
            <label class="text-sm">
              <span class="block text-xs text-text-muted" data-i18n="ui.projectSettings.field.github">GitHub repository</span>
              <input id="github_repository" type="text" class="mt-1 w-full rounded-lg border border-border-dark bg-transparent px-3 py-2" placeholder="owner/repo" />
            </label>

            <label class="text-sm">
              <span class="block text-xs text-text-muted" data-i18n="ui.projectSettings.field.figma">Figma file</span>
              <input id="figma_file" type="text" class="mt-1 w-full rounded-lg border border-border-dark bg-transparent px-3 py-2" placeholder="https://www.figma.com/file/..." />
            </label>

            <label class="text-sm">
              <span class="block text-xs text-text-muted" data-i18n="ui.projectSettings.field.drive">Drive URL</span>
              <input id="drive_url" type="url" class="mt-1 w-full rounded-lg border border-border-dark bg-transparent px-3 py-2" placeholder="https://drive.google.com/drive/folders/..." />
            </label>

            <div class="flex items-center gap-3 pt-2">
              <button id="save" type="submit" class="px-4 py-2 rounded-lg bg-primary text-white text-sm font-semibold hover:bg-primary/90" data-i18n="ui.projectSettings.save">保存</button>
              <span id="save-status" class="text-xs text-text-muted"></span>
            </div>
          </form>
        </section>
      </div>
    </main>

    <script src="/ui/sidebar.js"></script>
    <script src="/ui/i18n/i18n.js" defer></script>
    <script type="module">
      import { apiGet, apiPut, isPrefixedId, setText, t } from "/ui/api.js";

      const params = new URLSearchParams(window.location.search || "");
      const rawProjectId = (params.get("project_id") || "").trim();
      const projectId = isPrefixedId("project", rawProjectId) ? rawProjectId : "";

      const feedback = document.getElementById("feedback");
      const retry = document.getElementById("retry");
      const form = document.getElementById("settings-form");
      const saveBtn = document.getElementById("save");
      const saveStatus = document.getElementById("save-status");
      const backLink = document.getElementById("back-link");
      const githubEl = document.getElementById("github_repository");
      const figmaEl = document.getElementById("figma_file");
      const driveEl = document.getElementById("drive_url");

      if (projectId && backLink) {
        const u = new URL(backLink.href, window.location.origin);
        u.searchParams.set("project_id", projectId);
        backLink.href = `${u.pathname}${u.search}`;
      }

      function setDisabled(disabled) {
        [githubEl, figmaEl, driveEl, saveBtn].forEach((el) => {
          if (el) el.disabled = disabled;
        });
      }

      async function load() {
        retry.classList.add("hidden");
        await setText(feedback, "common.loading", true);
        saveStatus.textContent = "";

        if (!projectId) {
          const msg = rawProjectId ? "project_id format is invalid" : await t("ui.projectSettings.missingProjectId");
          feedback.textContent = `${await t("common.error")}: ${msg}`;
          retry.classList.remove("hidden");
          setDisabled(true);
          return;
        }

        setDisabled(true);
        try {
          const item = await apiGet(`/projects/${encodeURIComponent(projectId)}/settings`);
          githubEl.value = String(item.github_repository || "");
          figmaEl.value = String(item.figma_file || "");
          driveEl.value = String(item.drive_url || "");
          feedback.textContent = "";
          setDisabled(false);
        } catch (error) {
          const notFound = String(error && error.message || "").includes("404");
          feedback.textContent = `${await t("common.error")}: ${await t(notFound ? "ui.project.notFound" : "ui.projectSettings.loadFailed")}`;
          retry.classList.remove("hidden");
          setDisabled(true);
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!projectId) return;
        saveStatus.textContent = "";
        saveBtn.disabled = true;
        try {
          await apiPut(`/projects/${encodeURIComponent(projectId)}/settings`, {
            github_repository: githubEl.value.trim(),
            figma_file: figmaEl.value.trim(),
            drive_url: driveEl.value.trim(),
          });
          saveStatus.textContent = await t("ui.projectSettings.saved");
        } catch (error) {
          saveStatus.textContent = `${await t("common.error")}: ${String((error && error.message) || "failed")}`;
        } finally {
          saveBtn.disabled = false;
        }
      });

      retry.addEventListener("click", load);
      load();
    </script>
  </body>
</html>

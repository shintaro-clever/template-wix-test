<!DOCTYPE html>
<html class="dark" lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Orchestrator AI - Project Drive</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = { darkMode:"class", theme:{ extend:{ colors:{
      primary:"#a55c50","background-light":"#f7f6f6","background-dark":"#1d1615",
      "card-dark":"#251f1e","border-dark":"#3d3432","text-muted":"#b1a7a5"
    }, fontFamily:{display:["Inter","sans-serif"]}, borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem",full:"9999px"} } } };
  </script>
  <style>
    body{font-family:'Inter',"Noto Sans JP",sans-serif;}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
    .custom-scrollbar::-webkit-scrollbar{width:6px;height:6px;}
    .custom-scrollbar::-webkit-scrollbar-thumb{background:#3d3432;border-radius:10px;}
  </style>
</head>
<body data-page="projects" class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex overflow-hidden">
  <aside class="w-64 flex-shrink-0 border-r border-primary/10 bg-background-dark flex flex-col h-screen">
  <div class="p-6 flex items-center gap-3">
    <div class="w-8 h-8 rounded bg-primary flex items-center justify-center text-white">
      <span class="material-symbols-outlined text-xl">auto_fix</span>
    </div>
    <h1 class="text-lg font-bold tracking-tight text-white">Orchestrator AI</h1>
  </div>
  <nav class="flex-1 px-4 py-2 space-y-1 overflow-y-auto custom-scrollbar">
    <div class="pb-4">
      <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2" data-i18n="nav.menu">メニュー</p>
      <a data-nav-key="dashboard" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/dashboard.html"><span class="material-symbols-outlined">dashboard</span><span class="text-sm font-medium" data-i18n="nav.dashboard">ダッシュボード</span></a>
      <a data-nav-key="projects" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/projects.html"><span class="material-symbols-outlined">folder</span><span class="text-sm font-medium" data-i18n="nav.projects">プロジェクト</span></a>
      <a data-nav-key="analytics" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/analytics.html"><span class="material-symbols-outlined">bar_chart</span><span class="text-sm font-medium" data-i18n="nav.analytics">アナリティクス</span></a>
      <a data-nav-key="settings" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-white hover:bg-primary/10 rounded-lg transition-colors" href="/ui/settings.html"><span class="material-symbols-outlined">settings</span><span class="text-sm font-medium" data-i18n="nav.settings">設定</span></a>
    </div>
  </nav>
</aside>

  <main class="flex-1 flex flex-col h-screen overflow-hidden min-w-0">
    <header class="h-16 border-b border-border-dark px-6 md:px-8 flex items-center justify-between bg-background-light/50 dark:bg-background-dark/50 backdrop-blur-md z-10">
      <h2 class="text-xl font-bold"><span data-i18n="ui.projectDrive.title">ui.projectDrive.title</span></h2>
      <a id="back-link" href="/ui/project.html" class="inline-flex items-center gap-2 text-sm font-semibold text-primary hover:underline"><span class="material-symbols-outlined text-base">arrow_back</span><span data-i18n="ui.projectDrive.back">Project概要へ戻る</span></a>
    </header>

    <div class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar space-y-6">
      <section class="bg-white dark:bg-card-dark p-5 rounded-xl border border-border-dark">
        <h1 class="text-xl font-bold" data-i18n="ui.projectDrive.h1">プロジェクトDrive</h1>
        <p class="mt-2 text-sm text-text-muted" data-i18n="ui.projectDrive.desc">Drive連携状態と対象ファイルを確認します。</p>
      </section>

      <!-- loading state -->
      <section id="loading-section" class="bg-white dark:bg-card-dark p-5 rounded-xl border border-border-dark">
        <p class="text-sm text-text-muted" data-i18n="ui.projectDrive.loading">読み込み中...</p>
      </section>

      <!-- error state -->
      <section id="error-section" class="bg-rose-50 dark:bg-rose-900/10 border border-rose-300/40 rounded-xl p-4 hidden">
        <h3 class="text-sm font-semibold text-rose-700 dark:text-rose-300" data-i18n="ui.projectDrive.error.title">取得エラー</h3>
        <p id="error-message" class="mt-1 text-xs text-rose-600 dark:text-rose-400"></p>
        <button id="retry-btn" type="button" class="mt-3 inline-flex items-center gap-2 px-3 py-1.5 rounded-lg border border-rose-400/40 text-xs font-semibold text-rose-700 dark:text-rose-300 hover:bg-rose-100 dark:hover:bg-rose-900/20">
          <span class="material-symbols-outlined text-sm">refresh</span>
          <span data-i18n="ui.projectDrive.retry">再試行</span>
        </button>
      </section>

      <!-- main content / form -->
      <section id="content-section" class="bg-white dark:bg-card-dark p-5 rounded-xl border border-border-dark hidden">
        <dl class="space-y-4">
          <div>
            <dt class="text-xs text-text-muted font-semibold mb-1" data-i18n="ui.projectDrive.field.folder_id">Folder ID</dt>
            <input id="field-folder-id" type="text" class="w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-primary" placeholder="folder_id" />
          </div>
          <div>
            <dt class="text-xs text-text-muted font-semibold mb-1" data-i18n="ui.projectDrive.field.folder_url">Folder URL</dt>
            <input id="field-folder-url" type="text" class="w-full rounded-lg border border-border-dark bg-transparent px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-primary" placeholder="https://drive.google.com/..." />
          </div>
          <div>
            <dt class="text-xs text-text-muted font-semibold mb-1" data-i18n="ui.projectDrive.field.enabled">Enabled</dt>
            <label class="flex items-center gap-2 cursor-pointer">
              <input id="field-enabled" type="checkbox" class="rounded" />
              <span id="enabled-label" class="text-xs">disabled</span>
            </label>
          </div>
        </dl>
      </section>

      <!-- save section -->
      <section id="save-section" class="bg-white dark:bg-card-dark p-5 rounded-xl border border-border-dark hidden">
        <div class="flex flex-wrap items-center gap-3">
          <button id="save-btn" type="button" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-primary text-white text-sm font-semibold hover:bg-primary/90 disabled:opacity-60 disabled:cursor-not-allowed">
            <span class="material-symbols-outlined text-base">save</span>
            <span data-i18n="ui.projectDrive.action.save">保存</span>
          </button>
          <a href="/ui/settings-drive.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-border-dark text-sm font-semibold hover:bg-primary/10"><span class="material-symbols-outlined text-base">settings</span><span data-i18n="ui.projectDrive.action.settings">Drive設定へ</span></a>
          <!-- common.notImplementedYet: upload is a future phase -->
          <button type="button" disabled class="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-border-dark text-sm font-semibold opacity-60 cursor-not-allowed"><span class="material-symbols-outlined text-base">upload</span><span data-i18n="ui.projectDrive.action.upload">アップロード</span></button>
        </div>
        <p id="save-status" class="mt-2 text-xs hidden"></p>
        <p class="mt-2 text-xs text-amber-600" data-i18n="common.notImplementedYet">未実装（次フェーズで対応）</p>
      </section>

      <section class="bg-white dark:bg-card-dark border border-dashed border-border-dark rounded-xl p-5 hidden" data-project-drive-empty>
        <h3 class="text-sm font-semibold" data-i18n="ui.projectDrive.empty.title">ファイルがありません</h3>
        <p class="mt-1 text-xs text-text-muted" data-i18n="ui.projectDrive.empty.desc">同期されたファイルがここに表示されます。</p>
      </section>
    </div>
  </main>

  <script src="/ui/sidebar.js"></script>
  <script src="/ui/i18n/i18n.js" defer></script>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const rawProjectId = (params.get('project_id') || '').trim();
      const PROJECT_ID_RE = /^project_[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
      const projectId = PROJECT_ID_RE.test(rawProjectId) ? rawProjectId : '';

      const backLink = document.getElementById('back-link');
      if (projectId && backLink) {
        backLink.href = `/ui/project.html?project_id=${encodeURIComponent(projectId)}`;
      }

      const loadingSection = document.getElementById('loading-section');
      const errorSection = document.getElementById('error-section');
      const errorMessage = document.getElementById('error-message');
      const contentSection = document.getElementById('content-section');
      const saveSection = document.getElementById('save-section');
      const saveBtn = document.getElementById('save-btn');
      const saveStatus = document.getElementById('save-status');
      const retryBtn = document.getElementById('retry-btn');
      const fieldFolderId = document.getElementById('field-folder-id');
      const fieldFolderUrl = document.getElementById('field-folder-url');
      const fieldEnabled = document.getElementById('field-enabled');
      const enabledLabel = document.getElementById('enabled-label');

      fieldEnabled.addEventListener('change', function () {
        enabledLabel.textContent = fieldEnabled.checked ? 'enabled' : 'disabled';
      });

      function showLoading() {
        loadingSection.classList.remove('hidden');
        errorSection.classList.add('hidden');
        contentSection.classList.add('hidden');
        saveSection.classList.add('hidden');
      }

      function showError(msg) {
        loadingSection.classList.add('hidden');
        errorSection.classList.remove('hidden');
        contentSection.classList.add('hidden');
        saveSection.classList.add('hidden');
        errorMessage.textContent = msg || 'エラーが発生しました';
      }

      function showContent(data) {
        loadingSection.classList.add('hidden');
        errorSection.classList.add('hidden');
        contentSection.classList.remove('hidden');
        saveSection.classList.remove('hidden');

        fieldFolderId.value = (data && data.folder_id) || '';
        fieldFolderUrl.value = (data && data.folder_url) || '';
        fieldEnabled.checked = !!(data && data.enabled);
        enabledLabel.textContent = fieldEnabled.checked ? 'enabled' : 'disabled';
      }

      function loadData() {
        if (!projectId) {
          showError(rawProjectId ? 'project_id format is invalid' : 'project_id が指定されていません');
          return;
        }
        showLoading();
        fetch(`/api/projects/${encodeURIComponent(projectId)}/drive`)
          .then(function (r) { return r.json().then(function (b) { return { ok: r.ok, status: r.status, body: b }; }); })
          .then(function (res) {
            if (!res.ok) {
              showError((res.body && res.body.message) || 'HTTP ' + res.status);
            } else {
              showContent(res.body);
            }
          })
          .catch(function (e) { showError(e.message); });
      }

      if (saveBtn) {
        saveBtn.addEventListener('click', function () {
          if (!projectId) return;
          const body = {
            folder_id: fieldFolderId.value,
            folder_url: fieldFolderUrl.value,
            enabled: fieldEnabled.checked
          };
          saveBtn.disabled = true;
          saveStatus.className = 'mt-2 text-xs text-text-muted';
          saveStatus.textContent = '保存中...';
          saveStatus.classList.remove('hidden');
          fetch(`/api/projects/${encodeURIComponent(projectId)}/drive`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          })
            .then(function (r) { return r.json().then(function (b) { return { ok: r.ok, status: r.status, body: b }; }); })
            .then(function (res) {
              saveBtn.disabled = false;
              if (!res.ok) {
                saveStatus.className = 'mt-2 text-xs text-rose-600';
                saveStatus.textContent = (res.body && res.body.message) || '保存に失敗しました';
              } else {
                saveStatus.className = 'mt-2 text-xs text-emerald-600';
                saveStatus.textContent = '保存しました';
                showContent(res.body);
              }
            })
            .catch(function (e) {
              saveBtn.disabled = false;
              saveStatus.className = 'mt-2 text-xs text-rose-600';
              saveStatus.textContent = e.message;
            });
        });
      }

      if (retryBtn) {
        retryBtn.addEventListener('click', loadData);
      }

      loadData();
    })();
  </script>
</body>
</html>

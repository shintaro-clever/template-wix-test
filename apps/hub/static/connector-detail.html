<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connector Detail</title>
    <style>
      :root {
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        color: #0f172a;
        background-color: #f8fafc;
      }
      body {
        margin: 0;
        padding: 0;
        background: #f8fafc;
      }
      header {
        background: #111827;
        color: #fff;
        padding: 1.5rem;
      }
      header a {
        color: #93c5fd;
        text-decoration: none;
      }
      header h1 {
        margin: 0.5rem 0 0;
        font-size: 1.75rem;
      }
      main {
        max-width: 860px;
        margin: 2rem auto;
        padding: 0 1.5rem 3rem;
      }
      .card {
        background: #fff;
        border-radius: 18px;
        padding: 2rem;
        box-shadow: 0 30px 60px rgba(15, 23, 42, 0.08);
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        font-size: 0.85rem;
        font-weight: 600;
        border-radius: 999px;
        padding: 0.2rem 0.75rem;
        margin-bottom: 1rem;
      }
      .status-pill.ready {
        background: #dcfce7;
        color: #15803d;
      }
      .status-pill.pending {
        background: #fee2e2;
        color: #b91c1c;
      }
      .meta {
        color: #64748b;
        margin-bottom: 1rem;
      }
      ul.inputs {
        padding-left: 1.2rem;
        color: #334155;
      }
      ul.inputs li {
        margin-bottom: 0.35rem;
      }
      .actions {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        margin-top: 1.5rem;
      }
      button,
      .link-btn {
        border: none;
        background: #2563eb;
        color: #fff;
        padding: 0.75rem 1.5rem;
        border-radius: 999px;
        font-size: 1rem;
        cursor: pointer;
        text-decoration: none;
      }
      .link-btn.secondary {
        background: transparent;
        color: #2563eb;
        border: 1px solid #2563eb;
      }
      .error {
        color: #b91c1c;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/connectors">← Connectors 一覧へ戻る</a>
      <h1 id="title">Loading...</h1>
    </header>
    <main>
      <article class="card" id="detailCard" hidden>
        <div id="statusPill" class="status-pill"></div>
        <p class="meta" id="meta"></p>
        <p id="description"></p>
        <section>
          <h2>想定する入力項目</h2>
          <ul class="inputs" id="inputsList"></ul>
        </section>
        <div class="actions">
          <a id="configureBtn" class="link-btn" href="#">設定へ</a>
          <a class="link-btn secondary" href="/connections">Connections へ</a>
        </div>
      </article>
      <p id="errorMessage" class="error" hidden>指定されたコネクタが見つかりません。</p>
    </main>
    <script>
      const connectorId = window.location.pathname.replace(/\/$/, '').split('/').filter(Boolean).pop();
      const titleEl = document.getElementById('title');
      const detailCard = document.getElementById('detailCard');
      const statusPill = document.getElementById('statusPill');
      const metaEl = document.getElementById('meta');
      const descEl = document.getElementById('description');
      const inputsList = document.getElementById('inputsList');
      const configureBtn = document.getElementById('configureBtn');
      const errorMessage = document.getElementById('errorMessage');

      function renderConnector(connector) {
        titleEl.textContent = connector.name;
        const configured = Boolean(connector.status?.configured);
        statusPill.textContent = configured ? '設定済み' : '未設定';
        statusPill.className = `status-pill ${configured ? 'ready' : 'pending'}`;
        metaEl.textContent = `カテゴリ: ${connector.category} / タイプ: ${connector.type} / Provider: ${connector.provider_key}`;
        descEl.textContent = connector.description;
        inputsList.innerHTML = '';
        if (Array.isArray(connector.inputs) && connector.inputs.length) {
          connector.inputs.forEach((input) => {
            const li = document.createElement('li');
            li.innerHTML = `<strong>${input.label}</strong>: ${input.description}`;
            inputsList.appendChild(li);
          });
        } else {
          const li = document.createElement('li');
          li.textContent = '入力項目情報は未定義です。';
          inputsList.appendChild(li);
        }
        configureBtn.href = `/connections#${connector.provider_key}`;
        detailCard.hidden = false;
      }

      async function loadConnector() {
        try {
          const res = await fetch('/api/connectors');
          if (!res.ok) throw new Error('Failed to load catalog');
          const catalog = await res.json();
          const connector = catalog.find((item) => item.id === connectorId);
          if (!connector) {
            throw new Error('not_found');
          }
          renderConnector(connector);
        } catch (error) {
          console.error(error);
          titleEl.textContent = 'Connector Not Found';
          errorMessage.hidden = false;
        }
      }

      loadConnector();
    </script>
  </body>
</html>

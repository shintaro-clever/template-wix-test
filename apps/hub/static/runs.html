<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recent Runs</title>
    <style>
      :root {
        font-family: 'Inter', system-ui, sans-serif;
        color: #0f172a;
        background: #f8fafc;
      }
      body {
        margin: 0;
        padding: 0;
        background: #f8fafc;
      }
      header {
        background: #0f172a;
        color: #fff;
        padding: 1.5rem;
      }
      main {
        max-width: 960px;
        margin: 2rem auto;
        padding: 0 1.5rem 3rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 25px 45px rgba(15, 23, 42, 0.08);
      }
      th,
      td {
        padding: 0.85rem;
        border-bottom: 1px solid #e2e8f0;
        text-align: left;
        font-size: 0.95rem;
      }
      th {
        background: #f1f5f9;
        font-weight: 600;
      }
      tr:hover {
        background: #f8fafc;
        cursor: pointer;
      }
      .artifacts {
        font-size: 0.8rem;
        color: #475569;
      }
      .empty {
        margin-top: 1.5rem;
        color: #94a3b8;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Run Evidence</h1>
      <p>直近の run_id を確認し、詳細ページで run.json / audit / artifacts を閲覧できます。</p>
    </header>
    <main>
      <table id="runsTable">
        <thead>
          <tr>
            <th>run_id</th>
            <th>job_type</th>
            <th>Status</th>
            <th>Created</th>
            <th>Artifacts</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="empty" id="emptyState" hidden>Run が見つかりません。</div>
    </main>
    <script>
      const tbody = document.querySelector('#runsTable tbody');
      const emptyState = document.getElementById('emptyState');

      function renderRuns(runs) {
        tbody.innerHTML = '';
        if (!runs.length) {
          emptyState.hidden = false;
          return;
        }
        emptyState.hidden = true;
        runs.forEach((run) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><code>${run.run_id}</code></td>
            <td>${run.job_type}</td>
            <td>${run.status}</td>
            <td>${run.created_at || '-'}</td>
            <td class="artifacts">${(run.artifacts || []).length}</td>
          `;
          tr.addEventListener('click', () => {
            window.location.href = `/runs/${run.run_id}`;
          });
          tbody.appendChild(tr);
        });
      }

      async function loadRuns() {
        try {
          const res = await fetch('/api/runs');
          if (!res.ok) throw new Error('Failed to fetch runs');
          const data = await res.json();
          renderRuns(data.runs || []);
        } catch (error) {
          console.error(error);
          emptyState.hidden = false;
          emptyState.textContent = 'Run 一覧の取得に失敗しました。';
        }
      }

      loadRuns();
    </script>
  </body>
</html>

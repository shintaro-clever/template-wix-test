<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Integration Hub Chat</title>
    <style>
      :root {
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        color: #0f172a;
        background: #0f172a;
      }
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
      }
      aside {
        width: 280px;
        background: #111827;
        color: #e2e8f0;
        padding: 1.5rem;
        box-sizing: border-box;
      }
      aside h2 {
        margin-top: 0;
      }
      .connector-list {
        list-style: none;
        margin: 1rem 0 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
      }
      .connector-card {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 0.7rem 0.9rem;
      }
      .connector-card .label {
        font-size: 0.85rem;
        color: #94a3b8;
      }
      main {
        flex: 1;
        background: #f8fafc;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 1.5rem;
        border-bottom: 1px solid #e2e8f0;
      }
      .chat-log {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .message {
        max-width: 70%;
        padding: 0.85rem 1rem;
        border-radius: 12px;
        line-height: 1.5;
      }
      .message.user {
        align-self: flex-end;
        background: #2563eb;
        color: #fff;
      }
      .message.bot {
        align-self: flex-start;
        background: #e2e8f0;
        color: #0f172a;
      }
      .composer {
        padding: 1rem 1.5rem 1.5rem;
        border-top: 1px solid #e2e8f0;
        display: flex;
        gap: 1rem;
      }
      .composer textarea {
        flex: 1;
        resize: none;
        min-height: 72px;
        border-radius: 12px;
        border: 1px solid #cbd5f5;
        padding: 0.9rem;
        font-size: 1rem;
      }
      .composer button {
        border: none;
        background: #0f172a;
        color: #fff;
        padding: 0.9rem 1.75rem;
        border-radius: 12px;
        font-size: 1rem;
        cursor: pointer;
      }
      .note {
        font-size: 0.85rem;
        color: #475569;
        padding: 0 1.5rem 1rem;
      }
    </style>
  </head>
  <body>
    <aside>
      <h2>接続済みコネクタ</h2>
      <ul class="connector-list" id="connectorList"></ul>
      <p style="font-size: 0.8rem; color: #94a3b8;">Connections 画面で設定済みのコネクタのみが表示されます。</p>
    </aside>
    <main>
      <header>
        <h1>Chat（ダミー応答）</h1>
        <p>AI実行はまだ実装されていません。送信すると "Not implemented" を返します。</p>
      </header>
      <section class="chat-log" id="chatLog"></section>
      <div class="note">※ ここでのログはブラウザのみで保持され、実行環境には送信されません。</div>
      <div class="composer">
        <textarea id="chatInput" placeholder="メッセージを入力..."></textarea>
        <button id="sendBtn">送信</button>
      </div>
    </main>
    <script>
      const connectorListEl = document.getElementById('connectorList');
      const chatLogEl = document.getElementById('chatLog');
      const chatInput = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');

      function appendMessage(text, role) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.textContent = text;
        chatLogEl.appendChild(div);
        chatLogEl.scrollTop = chatLogEl.scrollHeight;
      }

      async function loadConnectors() {
        try {
          const res = await fetch('/api/connectors');
          if (!res.ok) throw new Error('Failed to fetch connectors');
          const catalog = await res.json();
          const configured = catalog.filter((item) => item.status?.configured);
          connectorListEl.innerHTML = '';
          if (!configured.length) {
            const li = document.createElement('li');
            li.textContent = '設定済みコネクタはありません。';
            connectorListEl.appendChild(li);
            return;
          }
          configured.forEach((item) => {
            const li = document.createElement('li');
            li.className = 'connector-card';
            li.innerHTML = `<div>${item.name}</div><div class="label">${item.category} / ${item.provider_key}</div>`;
            connectorListEl.appendChild(li);
          });
        } catch (error) {
          console.error(error);
          connectorListEl.innerHTML = '<li>読み込みに失敗しました</li>';
        }
      }

      function handleSend() {
        const text = chatInput.value.trim();
        if (!text) return;
        appendMessage(text, 'user');
        chatInput.value = '';
        setTimeout(() => {
          appendMessage('Not implemented: backend execution is not enabled yet.', 'bot');
        }, 400);
      }

      sendBtn.addEventListener('click', handleSend);
      chatInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          handleSend();
        }
      });

      loadConnectors();
    </script>
  </body>
</html>
